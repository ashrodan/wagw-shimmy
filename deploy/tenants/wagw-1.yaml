# wagw-1 — the FIRST real tenant, stood up BY HAND (see docs/FIRST-NUMBER.md), not via `fleetctl`.
# This file is a record of the live config as of 2026-06-16. Several values differ from how the
# fleet automation would render them, because the running GOWA is MULTI-DEVICE (see docs/PAIRING.md)
# and `fleetctl pair`/`render_remote` don't yet handle that. Treat the TODOs below as real gaps.

id: wagw-1
box: wagw-1.exe.xyz
magicdns: ""                      # TODO: set the tailnet MagicDNS name. Blank → fleetctl uses `box`.

# WhatsApp device. PAIRED 2026-06-16; WA display name "Bae".
device_jid: "61413118079@s.whatsapp.net"   # informational (the linked JID)
# IMPORTANT (multi-device build): GOWA_DEVICE_ID is the CHOSEN device id, NOT the JID. The shim sends
# it as X-Device-Id and GOWA resolves the device by it. fleetctl currently sets GOWA_DEVICE_ID=<jid>,
# which is WRONG for this binary — must be fixed to use this value.
gowa_device_id: "wagw-1"

# Bot's own number (WA_SELF_NUMBER), digits only. Enables group @-mention detection: GOWA rewrites a
# tag of the bot into the message body as "@61413118079", so an @-tag wakes the bot under require_mention.
self_number: "61413118079"

# Policy — current LIVE values on the box (set in-place; these include TEST settings).
policy:
  dm_policy: allowlist            # open | allowlist | off
  dm_allow: []                    # empty → no DM sender admitted yet (add your own number to test DMs)
  group_policy: allowlist         # off | allowlist | open
  group_allow:
    - "120363428950046857@g.us"   # "Bae Bot Test group 1" (owner 61425700099)
    - "120363408568709901@g.us"   # "2 baes" — added 2026-06-21; remapped to `hermes` channel
                                  # 2026-07-05 (see group_channels; entry here is now redundant
                                  # but harmless — mapped groups are implicitly admitted)
  require_mention: true           # DEFAULT now true: reply only when addressed (@-tag of self_number,
                                  # or reply-to-bot). Set false only to make it answer every group message.
  free_response_chats: []
  send_rate_per_min: 20

# In-shim voice-note transcription (src/transcribe.rs). When enabled, the shim is built with
# `--features transcribe` (whisper.cpp) and transcribes inbound WhatsApp voice notes on THIS box,
# folding the transcript into the forwarded `body` (annotated with the detected language + a
# confidence, e.g. `[voice note transcript (es, 0.98)]: "…"`) while still forwarding the audio
# media URL. Benefits ALL channels at once (dashi/hermes/colab/default). Model is a MULTILINGUAL
# ggml build (never a `.en` variant) so per-clip language auto-detection works.
transcribe:
  enabled: true
  model: ggml-base.bin            # ~148MB multilingual; provisioned to /var/lib/wagw/shim/models/
  model_url: "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base.bin"
  language: auto                  # per-clip auto-detect (multi-language). Pin a code to force one.

# Per-group channel routing (deploy/channels-env.awk).
# 2026-07-04: the live shim IS a channel-routing build (WA_CHANNELS=dashi,hermes confirmed on the
# box) — the old "pre-channel-routing binary" caveat no longer applies. See docs/CHANNEL-CONNECTIONS.md §A.
#
# `dashi` — the ops agent box (spike-rust-agent instance "Dashi", dashi.exe.xyz). Inbound forwards
# travel over the exe.dev peering `wagw1-to-dashi` (attached to wagw-1, peer = dashi, → its :8000);
# the URL below is that peering hostname (/whatsapp/inbound is appended). Replies come back to THIS
# shim's /send by chat_id (shared reply edge — no per-channel reply token). Dashi's agent-side env is
# scaffolded in spike-rust-agent: .env.dashi + the deployment registry in its docs/RELEASE.md.
channels:
  - label: dashi
    url: "https://wagw1-to-dashi.int.exe.xyz"
    token_secret: wagw-1/dashi_webhook_token   # distinct inbound bearer for this channel; omit to
                                               # reuse the default whatsapp_webhook_token instead.
  # `hermes` — Hermes Agent on bird-tortoise.exe.xyz, wired 2026-07-04. Hermes has no native
  # /whatsapp/inbound, so `wagw-hermes-adapter` (systemd unit on bird-tortoise, :8000,
  # ~/wagw-hermes-adapter/adapter.py) implements AGENT-WHATSAPP-CONTRACT: bearer-auth inbound,
  # dedup on id, ack-fast, then a `wagw chat -Q --resume <session>` turn (Hermes profile "wagw",
  # per-chat session map in ~/wagw-hermes-adapter/sessions.json) and a reply to this shim's /send.
  # Peerings: wagw1-to-hermes (wagw-1 → bird-tortoise:8000), hermes-to-wagw1 (bird-tortoise →
  # wagw-1:8080). Adapter env: /etc/wagw-hermes-adapter.env (0600) on bird-tortoise. To route
  # more groups to another Hermes *profile*: create the profile, add a label here + a
  # CHANNEL_PROFILES entry (label:wrapper) in the adapter env — same adapter, same peerings.
  - label: hermes
    url: "https://wagw1-to-hermes.int.exe.xyz"
    token_secret: wagw-1/hermes_webhook_token  # value also in /etc/wagw-hermes-adapter.env on
                                               # bird-tortoise (WHATSAPP_WEBHOOK_TOKEN)
  # `colab` — second Hermes profile on the SAME adapter/peerings (2026-07-05). Maps to Hermes
  # profile "colab" (cloned from wagw: WhatsApp SOUL, Honcho memory, Exa search) via
  # CHANNEL_PROFILES in /etc/wagw-hermes-adapter.env. Same inbound bearer as `hermes`.
  - label: colab
    url: "https://wagw1-to-hermes.int.exe.xyz"
    token_secret: wagw-1/hermes_webhook_token  # shared with the hermes channel
group_channels:
  # "Dashi by Dashlytix" — resolved 2026-06-28 from invite chat.whatsapp.com/HwmvvUoOA39FFJTQpo4XDc
  # via GOWA /group/info-from-link. A mapped group is implicitly admitted (no need to also list it in
  # policy.group_allow). NOTE: the linked device must JOIN this group before messages arrive
  # (POST /group/join-with-link) — outward action on the live account, do at go-live.
  - jid: "120363409170508840@g.us"
    channel: dashi
  # Hermes groups: add each group the bot is invited to as `- jid: "<...>@g.us" / channel: hermes`
  # and mirror it into WA_GROUP_CHANNELS on the box (comma-append `<jid>:hermes`), then
  # `systemctl restart wagw-shimmy`. Mapped groups are implicitly admitted; require_mention still
  # applies (@-tag the bot or reply to it).
  # "2 baes" — resolved 2026-07-05 from invite chat.whatsapp.com/GcYWBut3M1jKxhexx9YHjz via GOWA
  # /group/info-from-link; bot already a member (in group_allow since 2026-06-21).
  - jid: "120363408568709901@g.us"
    channel: hermes
  # "Rodan Co-Lab" — resolved 2026-07-05 from invite chat.whatsapp.com/Djaf3IvFURW9a9ZDQwPF7j;
  # bot already a member. Routes to the dedicated `colab` Hermes profile.
  - jid: "61425700099-1568067834@g.us"
    channel: colab

# Downstream agent — NOT yet wired to a working spike-rust-agent.
# AGENT_INBOUND_URL on the box currently points at the OLD Hermes agent
# (https://wagw1-to-agent.int.exe.xyz: /health 200 but /whatsapp/inbound 404). spike-rust-agent.exe.xyz
# also 404s on /whatsapp/inbound (WhatsApp channel not enabled). The shim is held in DEBUG SINK
# (SHIM_DEBUG_SINK=true drop-in) until a real spike-rust-agent inbound endpoint exists.
agent_inbound_url: "https://wagw1-to-agent.int.exe.xyz"   # TODO: repoint at a real spike-rust-agent
                                                          # (or at wagw1-to-hermes to make Hermes
                                                          # the default channel for DMs too)
debug_sink: false                                         # confirmed off on the box 2026-07-04
                                                          # (no SHIM_DEBUG_SINK drop-in)

# Secret NAMES — wagw-1's secrets are currently INLINE on the box (manual setup), not in a store.
# TODO: migrate to the store + LoadCredential on the next full provision.
secrets:
  gowa_basic_auth: wagw-1/gowa_basic_auth                 # TODO: confirm store names
  gowa_webhook_secret: wagw-1/gowa_webhook_secret
  whatsapp_webhook_token: wagw-1/whatsapp_webhook_token
  whatsapp_gateway_token: wagw-1/whatsapp_gateway_token
  dashi_webhook_token: wagw-1/dashi_webhook_token         # inbound bearer for the `dashi` channel;
                                                          # same value must be set as WHATSAPP_WEBHOOK_TOKEN in spike-rust-agent's .env.dashi
  hermes_webhook_token: wagw-1/hermes_webhook_token       # inbound bearer for the `hermes` channel;
                                                          # same value in /etc/wagw-hermes-adapter.env
                                                          # on bird-tortoise (generated 2026-07-04,
                                                          # currently inline on both boxes, not in a store)

