name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  GOWA_TAG: v8.7.0          # keep in lockstep with vendor/gowa submodule pin

jobs:
  shim:
    name: shim — build, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets    # 25 unit + 9 e2e; no network, no WA account

  gowa-artifact:
    name: gowa — build pinned binary artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive          # pulls vendor/gowa @ the pinned tag
      - uses: actions/setup-go@v6
        with:
          # Track the toolchain the pinned GOWA tag declares (v8.7.0 → go 1.25.5), so a tag bump
          # can't silently mismatch the Go version. setup-go@v6 sets GOTOOLCHAIN=local, so the
          # version here must satisfy go.mod (no auto-download).
          go-version-file: vendor/gowa/src/go.mod
          cache-dependency-path: vendor/gowa/src/go.sum   # module lives in the submodule, not root
      # Build the pinned GOWA source ONCE here; fleet boxes install this binary (no Go on prod).
      - name: build gowa
        working-directory: vendor/gowa/src
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" \
            -o "${GITHUB_WORKSPACE}/gowa-${GOWA_TAG}-linux-amd64" .
      # Publish a checksum alongside the binary so provision.sh can verify artifact integrity
      # (guards against artifact mixups, compromised storage, or tag drift — not just transport).
      - name: checksum gowa
        run: sha256sum "gowa-${GOWA_TAG}-linux-amd64" > "gowa-${GOWA_TAG}-linux-amd64.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: gowa-${{ env.GOWA_TAG }}-linux-amd64
          path: |
            gowa-${{ env.GOWA_TAG }}-linux-amd64
            gowa-${{ env.GOWA_TAG }}-linux-amd64.sha256
          if-no-files-found: error
